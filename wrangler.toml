name = "second-brain"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# AUTH_TOKEN is prompted during Deploy to Cloudflare flow
# Schema auto-creates on first Worker request

[[d1_databases]]
binding = "DB"
database_name = "second-brain-db"
database_id = "4f475851-3a09-4cb4-b6b6-b4b867fdf899"

[[vectorize]]
binding = "VECTORIZE"
index_name = "second-brain-vectors"
dimensions = 384
metric = "cosine"
# Created automatically by Deploy to Cloudflare button
# Or manually: wrangler vectorize create second-brain-vectors --dimensions=384 --metric=cosine

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "1b92783aa6544c2b9dda13f59b7e1977"

[assets]
directory = "./public"